name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run checks
        run: make check

      - name: Run vulnerability check
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...
          repo-checkout: false

      - name: Compile Windows security package
        run: GOOS=windows GOARCH=amd64 go test -c ./internal/security -o /tmp/ghostable-security.test.exe

      - name: Check GoReleaser config
        if: github.event_name == 'push'
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser-pro
          version: "~> v2"
          args: check
        env:
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
