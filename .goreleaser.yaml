version: 2

project_name: ghostable

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

before:
  hooks:
    - go mod tidy

builds:
  - id: ghostable
    main: ./cmd/ghostable
    binary: ghostable
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/ghostable-dev/ghostable/internal/app.version={{ .Version }}

archives:
  - id: ghostable
    ids:
      - ghostable
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE
  - id: ghostable-npm
    ids:
      - ghostable
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_npm_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

notarize:
  macos:
    - enabled: '{{ and (isEnvSet "MACOS_SIGN_P12") (isEnvSet "MACOS_SIGN_PASSWORD") (isEnvSet "MACOS_NOTARY_KEY") (isEnvSet "MACOS_NOTARY_KEY_ID") (isEnvSet "MACOS_NOTARY_ISSUER_ID") }}'
      ids:
        - ghostable
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: ghostable-dev
    name: ghostable

npms:
  - name: "@ghostable/beta"
    ids:
      - ghostable-npm
    description: "Local-first encrypted environment management CLI"
    homepage: "https://github.com/ghostable-dev/ghostable"
    keywords:
      - ghostable
      - cli
      - env
      - secrets
      - laravel
      - forge
    license: MIT
    author: "Ghostable LLC"
    repository: "https://github.com/ghostable-dev/ghostable"
    bugs: "https://github.com/ghostable-dev/ghostable/issues"
    access: public
    tag: latest
    format: tar.gz
    disable: '{{ not (isEnvSet "NPM_TOKEN") }}'

homebrew_casks:
  - name: ghostable
    ids:
      - ghostable
    binaries:
      - ghostable
    homepage: "https://github.com/ghostable-dev/ghostable"
    description: "Local-first encrypted environment management CLI"
    directory: Casks
    repository:
      owner: ghostable-dev
      name: homebrew-ghostable
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: ghostable-release-bot
      email: release-bot@ghostable.dev
    commit_msg_template: "Update ghostable Homebrew cask to {{ .Tag }}"
